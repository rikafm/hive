enum KanbanTicketColumn {
  todo
  in_progress
  review
  done
}

type KanbanTicket {
  id: String!
  projectId: String!
  sessionId: String
  worktreeId: String
  title: String!
  description: String
  column: KanbanTicketColumn!
  sortOrder: Float!
  archived: Boolean!
  createdAt: String!
  updatedAt: String!
  externalProvider: String
  externalId: String
  externalUrl: String
  totalTokens: Int!
}

input KanbanCreateTicketInput {
  projectId: String!
  sessionId: String
  worktreeId: String
  title: String!
  description: String
  column: KanbanTicketColumn!
  sortOrder: Float
  externalProvider: String
  externalId: String
  externalUrl: String
}

input KanbanUpdateTicketInput {
  title: String
  description: String
  column: KanbanTicketColumn
  sortOrder: Float
  sessionId: String
  worktreeId: String
}

