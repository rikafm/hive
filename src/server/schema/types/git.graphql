type GitFileStatus {
  path: String!
  relativePath: String!
  status: String!
  staged: Boolean!
}

type GitBranchInfo {
  name: String!
  tracking: String
  ahead: Int!
  behind: Int!
}

type GitDiffStatFile {
  path: String!
  additions: Int!
  deletions: Int!
  binary: Boolean!
}

type GitStatusChangedEvent {
  worktreePath: String!
}

type GitBranchChangedEvent {
  worktreePath: String!
}

type GitBranchWithStatus {
  name: String!
  isRemote: Boolean!
  isCheckedOut: Boolean!
  worktreePath: String
}

type GitPR {
  number: Int!
  title: String!
  author: String!
  headRefName: String!
}

# --- Inputs ---

input GitDiffInput {
  worktreePath: String!
  filePath: String!
  staged: Boolean!
  isUntracked: Boolean!
  contextLines: Int
}

input GitPushInput {
  worktreePath: String!
  remote: String
  branch: String
  force: Boolean
}

input GitPullInput {
  worktreePath: String!
  remote: String
  branch: String
  rebase: Boolean
}

# --- Branch diff types ---

type GitBranchDiffFile {
  path: String!
  status: String!
}

type GitBranchDiffFilesResult {
  success: Boolean!
  files: [GitBranchDiffFile!]
  error: String
}

type GitBranchFileDiffResult {
  success: Boolean!
  diff: String
  error: String
}

type GitFileContentBase64Result {
  success: Boolean!
  content: String
  mimeType: String
  error: String
}

type GitPRStateResult {
  success: Boolean!
  state: String
  merged: Boolean
  error: String
}

type PRReviewUser {
  login: String!
}

type PRReviewComment {
  id: Int!
  path: String
  line: Int
  body: String!
  user: PRReviewUser!
  createdAt: String!
}

type GitPRReviewCommentsResult {
  success: Boolean!
  comments: [PRReviewComment!]
  error: String
}

type CreatePRResult {
  success: Boolean!
  url: String
  number: Int
  error: String
}

type RangeDiff {
  commitSummary: String!
  diffSummary: String!
  diffPatch: String!
  commitCount: Int!
}

type GeneratePRContentResult {
  success: Boolean!
  title: String
  body: String
  error: String
}
