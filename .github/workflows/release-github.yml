name: Release (GitHub)

on:
  workflow_dispatch:
    inputs:
      skip_finalize:
        description: 'Skip the finalize job (keep release as draft, skip Homebrew)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  start:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Read version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Telegram — release started
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d text="🚀 Hive release v${{ steps.version.outputs.version }} — starting GitHub release" > /dev/null 2>&1 || true
        env:
          TG_TOKEN: ${{ secrets.MORIKO_TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.MORIKO_TELEGRAM_OPERATOR_CHAT_ID }}

  build-mac:
    needs: [start]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Download libghostty
        run: |
          mkdir -p vendor
          gh release download ghostty-deps-v1 -p libghostty.a -D vendor/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: pip3 install --break-system-packages setuptools
      - run: pnpm install --frozen-lockfile
      - name: Build Ghostty native addon
        run: pnpm build:native
        env:
          GHOSTTY_LIB_PATH: ${{ github.workspace }}/vendor/libghostty.a
      - run: pnpm build
        env:
          GHOSTTY_LIB_PATH: ${{ github.workspace }}/vendor/libghostty.a
      - run: pnpm exec electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - name: Telegram — macOS build complete
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d text="🍎 Hive v${{ needs.start.outputs.version }} — macOS build complete" > /dev/null 2>&1 || true
        env:
          TG_TOKEN: ${{ secrets.MORIKO_TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.MORIKO_TELEGRAM_OPERATOR_CHAT_ID }}
      - name: Telegram — macOS build failed
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d text="❌ Hive v${{ needs.start.outputs.version }} — macOS build failed" > /dev/null 2>&1 || true
        env:
          TG_TOKEN: ${{ secrets.MORIKO_TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.MORIKO_TELEGRAM_OPERATOR_CHAT_ID }}

  build-win:
    needs: [start]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm exec electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Telegram — Windows build complete
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d text="🪟 Hive v${{ needs.start.outputs.version }} — Windows build complete" > /dev/null 2>&1 || true
        env:
          TG_TOKEN: ${{ secrets.MORIKO_TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.MORIKO_TELEGRAM_OPERATOR_CHAT_ID }}
      - name: Telegram — Windows build failed
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d text="❌ Hive v${{ needs.start.outputs.version }} — Windows build failed" > /dev/null 2>&1 || true
        env:
          TG_TOKEN: ${{ secrets.MORIKO_TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.MORIKO_TELEGRAM_OPERATOR_CHAT_ID }}

  build-linux:
    needs: [start]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm exec electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Telegram — Linux build complete
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d text="🐧 Hive v${{ needs.start.outputs.version }} — Linux build complete" > /dev/null 2>&1 || true
        env:
          TG_TOKEN: ${{ secrets.MORIKO_TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.MORIKO_TELEGRAM_OPERATOR_CHAT_ID }}
      - name: Telegram — Linux build failed
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d text="❌ Hive v${{ needs.start.outputs.version }} — Linux build failed" > /dev/null 2>&1 || true
        env:
          TG_TOKEN: ${{ secrets.MORIKO_TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.MORIKO_TELEGRAM_OPERATOR_CHAT_ID }}

  finalize:
    if: ${{ success() && inputs.skip_finalize != true }}
    runs-on: ubuntu-latest
    needs: [start, build-mac, build-win, build-linux]
    steps:
      - uses: actions/checkout@v4
      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Releasing version: v$VERSION"
      - name: Telegram — finalizing
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d text="📦 Hive v${VERSION} — finalizing release" > /dev/null 2>&1 || true
        env:
          TG_TOKEN: ${{ secrets.MORIKO_TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.MORIKO_TELEGRAM_OPERATOR_CHAT_ID }}
      - name: Publish release
        run: |
          NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="v$VERSION" \
            --jq '.body')
          gh release edit "v$VERSION" --draft=false --notes "$NOTES"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Update Homebrew cask
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_PAT: ${{ secrets.HOMEBREW_PAT }}
        run: |
          # Download macOS DMGs
          gh release download "v${VERSION}" -p "Hive-${VERSION}-arm64.dmg" -p "Hive-${VERSION}.dmg"

          # Compute SHA256
          SHA_ARM=$(sha256sum "Hive-${VERSION}-arm64.dmg" | awk '{print $1}')
          SHA_X64=$(sha256sum "Hive-${VERSION}.dmg" | awk '{print $1}')
          echo "SHA256 (arm64): $SHA_ARM"
          echo "SHA256 (x64):   $SHA_X64"

          # Clone homebrew repo
          git clone "https://x-access-token:${HOMEBREW_PAT}@github.com/morapelker/homebrew-hive.git" homebrew-hive
          cd homebrew-hive

          # Update cask file using node
          node -e "
            const fs = require('fs');
            let cask = fs.readFileSync('Casks/hive.rb', 'utf8');
            cask = cask.replace(/version \"[^\"]+\"/, 'version \"${VERSION}\"');
            let shaIndex = 0;
            cask = cask.replace(/sha256 \"[a-f0-9]+\"/g, (match) => {
              shaIndex++;
              if (shaIndex === 1) return 'sha256 \"${SHA_ARM}\"';
              if (shaIndex === 2) return 'sha256 \"${SHA_X64}\"';
              return match;
            });
            fs.writeFileSync('Casks/hive.rb', cask);
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/hive.rb
          git commit -m "Update Hive to v${VERSION}"
          git push origin main
      - name: Update official Homebrew cask
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_PAT }}
        run: |
          VERSION="${{ needs.start.outputs.version }}"

          # Reuse DMGs from prior step if present, download any missing ones
          [[ -f "Hive-${VERSION}-arm64.dmg" ]] || gh release download "v${VERSION}" -p "Hive-${VERSION}-arm64.dmg"
          [[ -f "Hive-${VERSION}.dmg" ]]       || gh release download "v${VERSION}" -p "Hive-${VERSION}.dmg"

          SHA_ARM=$(sha256sum "Hive-${VERSION}-arm64.dmg" | awk '{print $1}')
          SHA_X64=$(sha256sum "Hive-${VERSION}.dmg" | awk '{print $1}')

          bash scripts/update-homebrew-cask.sh "$VERSION" "$SHA_ARM" "$SHA_X64"
      - name: Telegram — release complete
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d text="✅ Hive v${VERSION} — released successfully (macOS, Windows, Linux)" > /dev/null 2>&1 || true
        env:
          TG_TOKEN: ${{ secrets.MORIKO_TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.MORIKO_TELEGRAM_OPERATOR_CHAT_ID }}
      - name: Telegram — finalize failed
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d text="❌ Hive v${VERSION} — finalize step failed" > /dev/null 2>&1 || true
        env:
          TG_TOKEN: ${{ secrets.MORIKO_TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.MORIKO_TELEGRAM_OPERATOR_CHAT_ID }}
