name: Release (GitHub)

on:
  workflow_dispatch:
    inputs:
      skip_finalize:
        description: 'Skip the finalize job (keep release as draft, skip Homebrew)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Download libghostty
        run: |
          mkdir -p vendor
          gh release download ghostty-deps-v1 -p libghostty.a -D vendor/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: pip3 install --break-system-packages setuptools
      - run: pnpm install --frozen-lockfile
      - name: Build Ghostty native addon
        run: pnpm build:native
        env:
          GHOSTTY_LIB_PATH: ${{ github.workspace }}/vendor/libghostty.a
      - run: pnpm build
        env:
          GHOSTTY_LIB_PATH: ${{ github.workspace }}/vendor/libghostty.a
      - run: pnpm exec electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - name: Read version
        id: version
        run: echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm exec electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm exec electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  finalize:
    if: ${{ inputs.skip_finalize != true }}
    runs-on: ubuntu-latest
    needs: [build-mac, build-win, build-linux]
    steps:
      - uses: actions/checkout@v4
      - name: Publish release
        run: gh release edit "v${{ needs.build-mac.outputs.version }}" --draft=false --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Update Homebrew cask
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_PAT: ${{ secrets.HOMEBREW_PAT }}
        run: |
          VERSION="${{ needs.build-mac.outputs.version }}"

          # Download macOS DMGs
          gh release download "v${VERSION}" -p "Hive-${VERSION}-arm64.dmg" -p "Hive-${VERSION}.dmg"

          # Compute SHA256
          SHA_ARM=$(sha256sum "Hive-${VERSION}-arm64.dmg" | awk '{print $1}')
          SHA_X64=$(sha256sum "Hive-${VERSION}.dmg" | awk '{print $1}')
          echo "SHA256 (arm64): $SHA_ARM"
          echo "SHA256 (x64):   $SHA_X64"

          # Clone homebrew repo
          git clone "https://x-access-token:${HOMEBREW_PAT}@github.com/morapelker/homebrew-hive.git" homebrew-hive
          cd homebrew-hive

          # Update cask file using node
          node -e "
            const fs = require('fs');
            let cask = fs.readFileSync('Casks/hive.rb', 'utf8');
            cask = cask.replace(/version \"[^\"]+\"/, 'version \"${VERSION}\"');
            let shaIndex = 0;
            cask = cask.replace(/sha256 \"[a-f0-9]+\"/g, (match) => {
              shaIndex++;
              if (shaIndex === 1) return 'sha256 \"${SHA_ARM}\"';
              if (shaIndex === 2) return 'sha256 \"${SHA_X64}\"';
              return match;
            });
            fs.writeFileSync('Casks/hive.rb', cask);
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/hive.rb
          git commit -m "Update Hive to v${VERSION}"
          git push origin main
